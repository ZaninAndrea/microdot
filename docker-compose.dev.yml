services:
  seaweedfs:
    image: chrislusf/seaweedfs:3.78
    container_name: seaweedfs
    command: >-
      server
      -ip=seaweedfs
      -ip.bind=0.0.0.0
      -dir=/data
      -master.port=9333
      -volume.port=8080
      -filer=true
      -filer.port=8888
      -s3
      -s3.port=8333
      -s3.config=/etc/seaweedfs/s3.conf
    ports:
      - "9333:9333"
      - "8080:8080"
      - "8888:8888"
      - "8333:8333"
    volumes:
      - ./tmp/seaweedfs:/data
      - ./s3.conf:/etc/seaweedfs/s3.conf:ro
    restart: unless-stopped
